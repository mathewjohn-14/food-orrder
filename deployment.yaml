apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-ordering-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-order
  template:
    metadata:
      labels:
        app: food-order
    spec:
      containers:
      - name: food-app
        image: senthamizhan14/food-order-system:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: food-order-service
spec:
  type: NodePort
  selector:
    app: food-order
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007